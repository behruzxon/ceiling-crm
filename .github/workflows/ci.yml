name: CI

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff mypy pydantic

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (core + shared only)
        run: mypy core/ shared/ --ignore-missing-imports

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --no-cov -q

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: ceiling-crm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Migration Check ──────────────────────────────────────────────────────────
  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify migration chain
        run: |
          python -c "
          import importlib, pathlib, re

          versions_dir = pathlib.Path('infrastructure/database/migrations/versions')
          files = sorted(versions_dir.glob('*.py'))

          revisions = {}
          down_revisions = {}
          for f in files:
              content = f.read_text()
              rev_match = re.search(r\"revision.*?=.*?['\\\"]([^'\\\"]+)\", content)
              down_match = re.search(r\"down_revision.*?=.*?['\\\"]([^'\\\"]*)\", content)
              if rev_match:
                  rev = rev_match.group(1)
                  down = down_match.group(1) if down_match else None
                  revisions[rev] = f.name
                  down_revisions[rev] = down

          # Check for broken chain (orphaned revisions)
          all_revs = set(revisions.keys())
          all_downs = set(v for v in down_revisions.values() if v)
          heads = all_revs - all_downs

          print(f'Migrations: {len(revisions)}')
          print(f'Heads: {heads}')

          if len(heads) > 1:
              print('ERROR: Multiple heads detected — merge required')
              for h in heads:
                  print(f'  {h} -> {revisions[h]}')
              exit(1)
          elif len(heads) == 0:
              print('ERROR: No head found')
              exit(1)
          else:
              print(f'Single head: {heads.pop()} — OK')
          "

      - name: Verify all models imported in env.py
        run: |
          python -c "
          import pathlib, re

          env_py = pathlib.Path('infrastructure/database/migrations/env.py').read_text()
          models_dir = pathlib.Path('infrastructure/database/models')
          model_files = [
              f.stem for f in models_dir.glob('*.py')
              if f.stem != '__init__'
          ]

          missing = []
          for model in model_files:
              pattern = f'models.{model}'
              if pattern not in env_py:
                  missing.append(model)

          if missing:
              print(f'ERROR: Models not imported in env.py: {missing}')
              exit(1)
          else:
              print(f'All {len(model_files)} models imported in env.py — OK')
          "
