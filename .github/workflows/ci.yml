name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: "."

jobs:
  # ── Lint & type-check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy types-redis

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Mypy
        run: mypy . --ignore-missing-imports

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15.6-alpine
        env:
          POSTGRES_USER: ceilingcrm
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ceilingcrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ceilingcrm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_SECRET_KEY: ci-test-secret-key-not-for-production
      BOT_TOKEN: "0000000000:AAFakeTokenForCI"
      BOT_ADMIN_GROUP_ID: "-1001234567890"
      OPENAI_API_KEY: sk-fake-ci-key
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ceilingcrm
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: ceilingcrm_test
      REDIS_HOST: localhost

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: pytest tests/unit/ -q --tb=short

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f deploy/docker/Dockerfile -t ceiling-crm:${{ github.sha }} .
