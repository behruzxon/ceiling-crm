name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      skip_checks:
        description: Skip pre-deploy checks (emergency only)
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Pre-deploy Gate ───────────────────────────────────────────────────────────
  pre-deploy:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_checks }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short --no-cov -q

      - name: Migration chain check
        run: |
          python -c "
          import pathlib, re
          versions_dir = pathlib.Path('infrastructure/database/migrations/versions')
          files = sorted(versions_dir.glob('*.py'))
          revisions, down_revisions = {}, {}
          for f in files:
              content = f.read_text()
              rev = re.search(r\"revision.*?=.*?['\\\"]([^'\\\"]+)\", content)
              down = re.search(r\"down_revision.*?=.*?['\\\"]([^'\\\"]*)\", content)
              if rev:
                  revisions[rev.group(1)] = f.name
                  down_revisions[rev.group(1)] = down.group(1) if down else None
          heads = set(revisions.keys()) - set(v for v in down_revisions.values() if v)
          assert len(heads) == 1, f'Expected 1 head, got {len(heads)}: {heads}'
          print(f'Migration chain OK — {len(revisions)} migrations, head: {heads.pop()}')
          "

  # ── Build & Push ──────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [pre-deploy]
    if: ${{ always() && (needs.pre-deploy.result == 'success' || inputs.skip_checks) }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=${{ inputs.environment }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: ${{ inputs.environment }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull bot worker scheduler
            docker compose up -d --no-deps bot worker scheduler
            echo "Waiting for health check..."
            sleep 15
            docker compose ps
            docker compose logs --tail=20 bot
