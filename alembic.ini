# ============================================================================
# Alembic configuration file
# alembic.ini — DO NOT commit credentials here.
# The database URL is injected via env.py from Pydantic Settings.
# ============================================================================

[alembic]
# Path to migration scripts
script_location = infrastructure/database/migrations

# Template for new migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration filenames
timezone = UTC

# Max length of auto-generated slugs in filenames
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

# The DB URL is set programmatically in env.py — leave empty here
sqlalchemy.url =

# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
